name: Backend CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'backend_coril/**'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'backend_coril/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend_coril

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build and Test with Maven
      run: ./mvnw clean verify