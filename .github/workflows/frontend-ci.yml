name: Frontend CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'frontend_coril/**'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'frontend_coril/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend_coril

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend_coril/package-lock.json'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run Tests
      run: npm run test
      
    - name: Build Application
      run: npm run build